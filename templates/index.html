<!DOCTYPE html>
<html>

<head>
<title>TableMate</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<header class="navbar">
<h2>🍽 TableMate</h2>
<!-- Admin button removed for security -->
</header>

<section class="hero">
<div class="hero-content">
<h1>Book Your Perfect Table</h1>
<p>Smart • Fast • AI-powered dining</p>
</div>
</section>

<div class="card">
<h2>Reserve Table</h2>

<input id="name" placeholder="Your name">
<input id="guests" type="number" placeholder="Guests">
<input id="date" type="date">
<input id="time" type="time">

<br>
<button onclick="book()">Reserve</button>
</div>

<div class="card">
<h2>Ask AI</h2>

<input id="chatInput" placeholder="Book table for 4 tomorrow at 8pm">
<button onclick="chat()">Send</button>

<div id="chatBox"></div>
</div>

<script>

async function book(){
const name=document.getElementById("name").value
const guests=document.getElementById("guests").value
const date=document.getElementById("date").value
const time=document.getElementById("time").value

const message=`book table for ${guests} under ${name} at ${time} on ${date}`

const res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message})
})

const data=await res.json()

alert(data.response)
}

async function chat(){
const input=document.getElementById("chatInput")
const message=input.value
const box=document.getElementById("chatBox")

box.innerHTML+=`<div class="user">${message}</div>`

const res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message})
})

const data=await res.json()

box.innerHTML+=`<div class="bot">${data.response}</div>`
box.scrollTop = box.scrollHeight

input.value=""
}

</script>

</body>
</html>
